[book]
title = "LUMEN"
description = "Universal, self-hostable LLM gateway in Rust — chat, embeddings, reranking."
authors = ["LUMEN contributors"]
language = "en"
src = "docs"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/qdequele/lumen"
edit-url-template = "https://github.com/qdequele/lumen/edit/main/docs/{path}"

[output.html.search]
enable = true

[output.html.fold]
enable = true
level = 1
