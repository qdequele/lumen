# Prometheus scrape config for the LUMEN test rig. A 5s interval keeps the
# demo dashboard lively; use 15-60s in production.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

# Starter rules for the silent failure modes (usage-log drops, rejected
# reloads, open breakers, probe-down providers, 5xx ratio). Visible at
# http://localhost:9090/alerts once the stack is up.
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: lumen
    static_configs:
      - targets: ["lumen:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
