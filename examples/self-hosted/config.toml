# Fully self-hosted, no API keys: Ollama (chat + embeddings, one provider)
# + TEI (rerank). Works offline. The native ollama kind serves chat through
# Ollama's OpenAI-compatible endpoint (the gateway appends the /v1 itself)
# and embeddings through the native /api/embed - keep base_url at the
# server root.
[[providers]]
name = "ollama"
kind = "ollama"
base_url = "http://localhost:11434"
first_token_timeout_ms = 60000      # first call may load the model into VRAM
total_timeout_ms = 120000

[[providers.models]]
id = "llama"
upstream_id = "llama3.2"
capabilities = ["chat"]

[[providers.models]]
id = "nomic-embed"
upstream_id = "nomic-embed-text"
capabilities = ["embed"]

[[providers]]
name = "tei"
kind = "tei"
base_url = "http://localhost:8081"

[[providers.models]]
id = "bge-reranker"
upstream_id = "BAAI/bge-reranker-large"
capabilities = ["rerank"]
