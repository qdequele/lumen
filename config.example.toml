# LUMEN example configuration.
#
# Copy to `config.toml` and adjust. Every value can also be overridden with an
# environment variable prefixed `LUMEN_`, using `__` for nesting, e.g.:
#   LUMEN_SERVER__PORT=9090
#   LUMEN_LOG_FORMAT=json
#
# SECURITY: API keys are NEVER written here. Each provider references the *name*
# of an environment variable that holds its key (`api_key_env`). LUMEN reads
# that variable at startup-time only when the provider is actually used.

# Log format: "pretty" (human-readable, default) or "json" (production).
# NOTE: top-level keys must appear BEFORE any [table] header in TOML.
log_format = "pretty"

# ---------------------------------------------------------------------------
# HTTP server
# ---------------------------------------------------------------------------
[server]
host = "127.0.0.1"        # bind address; use "0.0.0.0" in a container
port = 8080               # must not be 0
body_limit = 10485760     # max request body in bytes (10 MiB)

# How long to wait for the upstream's first sign of life before failing with
# LM-3011 (504). Streaming: time to the first SSE frame. Non-streaming: the
# whole upstream call (per-phase timeouts land later) - raise this if you run
# long non-streaming generations.
first_token_timeout_ms = 30000

# Idle interval after which a `: ping` SSE comment keeps proxies from reaping
# a silent stream.
sse_heartbeat_ms = 15000

# ---------------------------------------------------------------------------
# Auth: virtual keys, hard budgets, quotas, usage log. Disabled by
# default - the gateway is then an open proxy with no database at all.
#
# When enabled, the LUMEN_MASTER_KEY env var is REQUIRED (64 hex chars =
# 32 bytes). It is both the bearer token of the /admin API and the AES-256-GCM
# key sealing provider keys stored at rest. Never logged, never stored.
#
# Enforcement is in memory on the request path (the DB is never consulted per
# request): budget checks are an atomic reservation of the pre-call estimate,
# settled to the real usage after the call. Refusals: 402 LM-4001 (budget),
# 429 LM-4002 (RPM), 429 LM-4003 (TPM) - always BEFORE the upstream call.
# ---------------------------------------------------------------------------
[auth]
enabled = false
db_path = "lumen.db"          # SQLite file, created if missing
flush_interval_ms = 10000         # memory→DB budget flush; a crash loses at
                                  # most this much ACCOUNTING, never allows an
                                  # overrun (enforcement is in memory)
usage_channel_capacity = 10000    # bounded log channel; full = drop + counter
usage_batch_max = 500             # write a batch at this many entries…
usage_flush_ms = 2000             # …or at least this often
retention_days = 30               # purge usage_log rows older than this

# ---------------------------------------------------------------------------
# Telemetry (ADR 002).
#
# Clients may send an `x-lumen-metadata` header (alias: `cf-aig-metadata`)
# with a FLAT JSON object (≤ 16 keys, key ≤ 64 B, value ≤ 256 B, header ≤ 4 KiB)
# of string/number/bool values. The full object is attached to structured logs
# and the usage_log `metadata` column. It is opaque - never inspected - but it
# IS logged: do not put secrets or prompt content in it.
#
# ONLY the keys listed here become Prometheus labels on the token counters;
# everything else stays logs-only. Empty (the default) = client metadata can
# never create a single new time series. Cardinality is your decision.
# ---------------------------------------------------------------------------
[telemetry]
metadata_labels = []              # e.g. ["team", "env"]

# ---------------------------------------------------------------------------
# Token estimation strategy (ADR 003) - OPTIONAL, defaults to "heuristic".
#
# Token counts are a first-class output of every request. When an upstream
# reports usage, that authoritative count always wins (estimated = false).
# When it does NOT (e.g. TEI embeddings, some streams), LUMEN estimates
# locally and flags the count `estimated = true`. This knob picks the estimator:
#
#   "heuristic" (default) - a cheap ~4-bytes-per-token byte count. Zero added
#                           latency, allocation-light, always hot-path-safe.
#   "accurate"            - exact per-model BPE (tiktoken) for OpenAI-family
#                           models: cl100k_base for gpt-4 / gpt-3.5 /
#                           text-embedding-3, o200k_base for gpt-4o / o1 / o3 /
#                           gpt-4.1 / gpt-5 (matched on YOUR model id / alias).
#                           Non-OpenAI models keep the heuristic. The response
#                           envelope still carries the heuristic estimate (the
#                           request is never delayed); the accurate count is
#                           computed AFTER the response by a background task
#                           (BPE on the blocking pool, spawn_blocking) and
#                           lands in Prometheus and usage_log - the accounting
#                           surfaces. Only fires when an upstream omitted
#                           usage. Encoders are built once at startup.
#                           Streaming input counts remain heuristic (the
#                           stream is not buffered).
# ---------------------------------------------------------------------------
[tokenizer]
mode = "heuristic"                # "heuristic" (default) or "accurate"

# ---------------------------------------------------------------------------
# Resilience: retries, fallbacks, circuit breaker, timeouts, health checks.
#
# Every value below is the built-in default - the whole section is optional.
# Retries and the circuit breaker are always active with these defaults; only
# per-model `fallbacks` (see the model blocks below) and background health
# checks are opt-in. None of this ever touches the DB on the request path, and
# an upstream 429 storm can never destabilise the gateway itself.
# ---------------------------------------------------------------------------
[resilience]
# Retries - applied ONLY to retryable upstream failures (5xx, connect/read
# timeout, 429). A client 4xx is NEVER retried (a fallback would reject it too).
# Backoff is exponential with equal jitter, and honours an upstream
# `Retry-After` as a floor. While streaming, a retry happens only if no chunk
# has yet reached the client.
retry_max_attempts = 3            # total attempts per provider incl. the first
                                  # (set to 1 to disable retries); must not be 0
retry_base_ms = 200               # base backoff wait after the first failure
retry_max_ms = 5000               # ceiling on the exponential backoff term

# Circuit breaker - per (provider, model). After N consecutive provider-fault
# failures the circuit opens; while open the model is skipped straight to its
# next fallback, or answered with 503 LM-3020 (+ Retry-After) when none remains.
# After the cooldown, a single half-open probe decides whether to close again.
# State is exported as lumen_circuit_state{provider,model}
# (0 = closed, 1 = open, 2 = half-open).
circuit_failure_threshold = 5     # consecutive failures that trip it open
circuit_cooldown_ms = 30000       # time spent open before a half-open probe

# Timeouts. `connect` here is the default for the shared, pooled HTTP client.
# The first-token timeout lives in [server] (server.first_token_timeout_ms); the
# total timeout is here. ALL THREE (connect, first-token, total) can be
# overridden per provider (see the ollama-local block below). Overriding a
# provider's connect timeout gives it its OWN HTTP client, so it no longer
# shares the pool (ADR 005, 2026-07-15 amendment); the other two overrides do
# not. Each timeout maps to a distinct 504 for debugging: LM-3012 connect,
# LM-3011 first-token, LM-3013 total (the whole request - all retries and
# fallbacks together).
connect_timeout_ms = 5000         # TCP + TLS connection establishment
total_timeout_ms = 600000         # absolute per-request deadline (10 minutes)

# Background health checks (OFF by default). When enabled, a periodic task
# probes every provider that has a configured `base_url` (self-hosted TEI /
# Ollama / vLLM, or any explicit override) and publishes the result at
# GET /health/providers and on lumen_provider_up{provider}. Self-hosted kinds
# get a real liveness endpoint (TEI and vLLM: server-root /health; Ollama:
# /api/version) where a non-2xx means down; other kinds get a bare
# reachability GET on base_url. Providers on a built-in vendor URL report
# `unknown` (never probed - the gateway hardcodes no vendor endpoints). The
# gateway's own /health stays independent of provider health and does no I/O.
health_check_enabled = false
health_check_interval_ms = 30000  # probe cadence (must not be 0 when enabled)

# ---------------------------------------------------------------------------
# Providers
#
# Each `[[providers]]` block declares one upstream. `kind` selects the built-in
# implementation - one of the native integrations (openai | anthropic | google |
# azure | vertex_ai | bedrock | mistral | cohere | jina | voyage | mixedbread |
# pinecone | nvidia | tei | ollama) or one of the OpenAI-compatible hosts (groq |
# together | fireworks | deepseek | openrouter | perplexity | xai | deepinfra |
# huggingface | cloudflare | vllm). See docs/providers.md for the full matrix.
# `name` is your own label and must be unique.
#
# Each `[[providers.models]]` block exposes a model to clients:
#   id            the id clients send (owned entirely by you)
#   upstream_id   what LUMEN sends upstream (defaults to `id`)
#   capabilities  any of: "chat", "embed", "rerank"
#   modalities    input modalities; defaults to ["text"]. Add "image" to accept
#                 image content parts on /v1/embeddings (M9). Image input to a
#                 model without "image" is rejected with LM-2003.
# Model ids must be unique across ALL providers (a collision aborts startup and
# names both offending providers). Several ids MAY map to the same upstream_id.
# ---------------------------------------------------------------------------

# OpenAI: chat + embeddings.
[[providers]]
name = "openai"
kind = "openai"
api_key_env = "OPENAI_API_KEY"
# base_url = "https://api.openai.com/v1"   # optional override

[[providers.models]]
id = "gpt-4o"
upstream_id = "gpt-4o-2024-08-06"
capabilities = ["chat"]
# Input modalities this model accepts. Default is ["text"]; opt a model into
# vision (image_url content parts in /v1/chat/completions) by adding "image".
# An image part sent to a model without it is rejected with LM-2003 (400)
# before any upstream call. See docs/providers.md#vision-image-input.
# modalities = ["text", "image"]
# Optional prices (USD) - the source of cost counting and hard budgets.
# A model without prices costs 0: budgets then never bite on it.
cost_per_1m_input = 2.5
cost_per_1m_output = 10.0
# Fallback chain: if this provider exhausts its retries or its circuit is open,
# try these models IN ORDER. Each must exist below and serve every capability
# declared above (here "chat"), which is validated at boot. Whichever model
# actually serves the request is reported in the x-lumen-model-used
# response header and the usage_log.model_used column.
fallbacks = ["claude-3-5-sonnet"]

[[providers.models]]
id = "text-embedding-3-small"
capabilities = ["embed"]

# Anthropic: chat (bidirectional OpenAI <-> Anthropic translation). Configured
# here as gpt-4o's fallback - the same capability from a different vendor, so a
# single-vendor outage doesn't take chat down.
[[providers]]
name = "anthropic"
kind = "anthropic"
api_key_env = "ANTHROPIC_API_KEY"

[[providers.models]]
id = "claude-3-5-sonnet"
upstream_id = "claude-3-5-sonnet-20241022"
capabilities = ["chat"]
cost_per_1m_input = 3.0
cost_per_1m_output = 15.0

# Google Gemini (public Gemini Developer API): chat + embeddings. The key
# rides the `x-goog-api-key` header, never the URL. Embeddings go through
# `batchEmbedContents` (up to 100 inputs per upstream call; larger requests
# are split by the gateway).
# [[providers]]
# name = "google"
# kind = "google"
# api_key_env = "GEMINI_API_KEY"
#
# [[providers.models]]
# id = "gemini-2.0-flash"
# capabilities = ["chat"]
#
# [[providers.models]]
# id = "gemini-embedding-001"
# capabilities = ["embed"]

# Google Vertex AI: chat + embeddings (Gemini models on GCP). Distinct from
# kind = "google" (the public Gemini Developer API): Vertex uses regional
# endpoints and GCP service-account OAuth. `api_key_env` names a var holding
# the FULL service-account key JSON (the key file contents, not a path):
#   export VERTEX_SA_JSON="$(cat service-account.json)"
# `base_url` carries the GCP region; the project id comes from the JSON. LUMEN
# exchanges an RS256-signed JWT for a short-lived access token and caches it in
# memory (refreshed 60 s before expiry) - the key is never logged. Embeddings
# use the `:predict` endpoint, one input per upstream call (the gateway fans
# batches out concurrently; gemini-embedding-001 takes a single instance per
# request).
# [[providers]]
# name = "vertex"
# kind = "vertex_ai"
# api_key_env = "VERTEX_SA_JSON"
# base_url = "us-central1"
#
# [[providers.models]]
# id = "gemini-flash-vertex"
# upstream_id = "gemini-2.0-flash"
# capabilities = ["chat"]
#
# [[providers.models]]
# id = "gemini-embedding-vertex"
# upstream_id = "gemini-embedding-001"
# capabilities = ["embed"]

# AWS Bedrock: chat via the Converse API (one uniform schema across the
# Anthropic / Meta / Amazon / Mistral model families). Auth is AWS SigV4, NOT a
# bearer key: credentials come from the standard AWS environment variables
# (`AWS_ACCESS_KEY_ID`, `AWS_SECRET_ACCESS_KEY`, and optionally
# `AWS_SESSION_TOKEN`), re-read on every request, so `api_key_env` is not
# required. Set `base_url` to the runtime endpoint for your region; the region
# is parsed back out of it for the signing scope (standard and VPC endpoint
# hosts). For any other custom endpoint export AWS_REGION - a provider whose
# region cannot be determined fails at startup. `upstream_id` is the Bedrock
# model id and may include a version suffix with a colon.
[[providers]]
name = "bedrock"
kind = "bedrock"
base_url = "https://bedrock-runtime.us-east-1.amazonaws.com"
# api_key_env = "AWS_SECRET_ACCESS_KEY"   # optional: overrides the env secret

[[providers.models]]
id = "bedrock-claude-3-5-sonnet"
upstream_id = "anthropic.claude-3-5-sonnet-20241022-v2:0"
capabilities = ["chat"]
modalities = ["text", "image"]

# Ollama: local, keyless. Requires a base_url - the server ROOT, no /v1.
# Embeddings use the native /api/embed; chat goes through Ollama's
# OpenAI-compatible endpoint (the gateway appends the /v1 itself).
[[providers]]
name = "ollama-local"
kind = "ollama"
base_url = "http://localhost:11434"
# Per-provider timeout overrides (optional). A local model can take a while to
# load into VRAM on its first call, so relax the first-token and total windows
# for THIS provider only; they fall back to [server].first_token_timeout_ms and
# [resilience].total_timeout_ms when unset. `connect_timeout_ms` may also be
# overridden here: a self-hosted box on a slow link can be given a looser connect
# deadline than the global default. NOTE: setting connect_timeout_ms gives this
# provider its OWN (unpooled) HTTP client (ADR 005, 2026-07-15 amendment); leave
# it unset to keep sharing the pooled client. All apply to every model this
# provider serves.
first_token_timeout_ms = 60000
total_timeout_ms = 120000
# strict = false   # optional (default false). When true, reject a request that
                   # sets an unsupported-but-meaningful field this provider
                   # cannot honor with a 400 (LM-1001) instead of silently
                   # dropping it. Ollama: `dimensions`. Translated chat kinds
                   # (anthropic, google, vertex_ai, bedrock, cohere):
                   # response_format / seed / logprobs / top_logprobs /
                   # logit_bias / parallel_tool_calls
                   # where no native mapping exists (docs/providers.md, "OpenAI
                   # chat extras on translated providers"). `encoding_format` is
                   # always handled at the response edge and is never affected.
connect_timeout_ms = 10000        # own client: relaxed connect for a slow local link

[[providers.models]]
id = "local-llama"
upstream_id = "llama3.2"
capabilities = ["chat"]

[[providers.models]]
id = "nomic-embed"
upstream_id = "nomic-embed-text"
capabilities = ["embed"]

# Cohere: embeddings + reranking. A single model can serve BOTH capabilities.
[[providers]]
name = "cohere"
kind = "cohere"
api_key_env = "COHERE_API_KEY"

[[providers.models]]
id = "rerank-english"
upstream_id = "rerank-v3.5"
capabilities = ["rerank"]
# Rerank is billed in search units (1 unit ≈ one query over ≤ 100 documents).
cost_per_1k_searches = 2.0
# A multi-hop fallback chain across three rerank vendors: if Cohere is down,
# try Jina, then Voyage. All three serve "rerank", so a rerank request survives
# any single vendor outage.
fallbacks = ["jina-rerank", "voyage-rerank"]

# Versioned aliasing: a stable public id pinned to a specific upstream version.
# Bump `upstream_id` to roll the model forward without changing client code.
[[providers.models]]
id = "embed-multilingual"
upstream_id = "embed-v4.0"
capabilities = ["embed", "rerank"]
# embed-v4 is multimodal: declare "image" so /v1/embeddings accepts image
# content parts. With [image_fetch] enabled, remote image URLs are fetched and
# inlined; otherwise clients must pass a data: URI.
modalities = ["text", "image"]

# Jina: embeddings + reranking (hosted).
[[providers]]
name = "jina"
kind = "jina"
api_key_env = "JINA_API_KEY"

[[providers.models]]
id = "jina-rerank"
upstream_id = "jina-reranker-v2-base-multilingual"
capabilities = ["rerank"]

# Voyage: embeddings + reranking (hosted).
[[providers]]
name = "voyage"
kind = "voyage"
api_key_env = "VOYAGE_API_KEY"

[[providers.models]]
id = "voyage-rerank"
upstream_id = "rerank-2"
capabilities = ["rerank"]

# Mixedbread: reranking (hosted, mxbai-rerank-*). Bearer auth. The endpoint is
# POST /v1/reranking (`input`/`top_k` on the wire); the gateway translates.
[[providers]]
name = "mixedbread"
kind = "mixedbread"
api_key_env = "MXBAI_API_KEY"

[[providers.models]]
id = "mxbai-rerank"
upstream_id = "mixedbread-ai/mxbai-rerank-large-v1"
capabilities = ["rerank"]

# Pinecone: hosted reranking. Auth is the `Api-Key` header (not a bearer token).
# Pinecone reports real usage (rerank_units), carried through as search_units.
[[providers]]
name = "pinecone"
kind = "pinecone"
api_key_env = "PINECONE_API_KEY"

[[providers.models]]
id = "pinecone-rerank"
upstream_id = "pinecone-rerank-v0"
capabilities = ["rerank"]

# NVIDIA NIM: reranking via `{base}/v1/ranking`. base_url REQUIRED (the NIM
# root); keyless for self-hosted NIMs (set api_key_env for the hosted API).
# Scores are raw logits (unbounded, comparable only within one response).
[[providers]]
name = "nvidia-nim"
kind = "nvidia"
base_url = "http://localhost:8000"
# api_key_env = "NVIDIA_API_KEY"

[[providers.models]]
id = "nvidia-rerank"
upstream_id = "nvidia/llama-3.2-nv-rerankqa-1b-v2"
capabilities = ["rerank"]

# Together: one entry serves chat + embed (OpenAI-compatible) AND native rerank
# (LlamaRank, Cohere-shaped `/rerank`). Bearer auth, default base URL.
[[providers]]
name = "together"
kind = "together"
api_key_env = "TOGETHER_API_KEY"

[[providers.models]]
id = "llama-rank"
upstream_id = "Salesforce/Llama-Rank-V1"
capabilities = ["rerank"]

# TEI (Text Embeddings Inference): self-hosted, keyless. Requires a base_url.
# Serves one model per process; `upstream_id` is ignored by TEI but kept for
# your own clarity.
[[providers]]
name = "tei-local"
kind = "tei"
base_url = "http://localhost:8081"

[[providers.models]]
id = "bge-reranker"
upstream_id = "BAAI/bge-reranker-large"
capabilities = ["rerank"]

# Azure OpenAI: chat + embeddings, reusing the OpenAI JSON schema. Auth is the
# `api-key` header (never a bearer token); routing is by URL path
# (/openai/deployments/{deployment}/...), not the `model` field, so each
# model's `upstream_id` below must be the Azure DEPLOYMENT NAME, not an
# OpenAI model id. `base_url` is required (every Azure resource endpoint is
# operator-specific). The Azure API version is selected by the optional
# `api_version` field below; for back-compat, `base_url` may instead carry an
# `?api-version=YYYY-MM-DD` query string. Precedence: the `api_version` field
# wins over the `base_url` query string, which wins over a pinned built-in
# default (see `crates/providers/src/azure`). `api_version` is azure-only:
# setting it on any other kind is a boot-time config error.
[[providers]]
name = "azure-openai"
kind = "azure"
api_key_env = "AZURE_OPENAI_API_KEY"
base_url = "https://my-resource.openai.azure.com"
api_version = "2024-10-21"

[[providers.models]]
id = "azure-gpt-4o"
upstream_id = "my-gpt4o-deployment"   # the Azure deployment name
capabilities = ["chat"]

# ---------------------------------------------------------------------------
# Multimodal image fetching (M9) - OFF by default.
#
# When enabled, a remote http(s) image URL in a /v1/embeddings content-parts
# request is fetched server-side, base64-encoded, and inlined as a data: URI
# before being sent to the provider. Disabled → such a URL is rejected with
# LM-2005 (clients must pass a data: URI themselves).
#
# Guards (always on when enabled): the private/loopback/link-local IP block is
# non-configurable; the connection is pinned to the vetted resolved address
# (DNS-rebinding safe); downloads are capped and time-bounded; only image/*
# content types are accepted. Restrict `allowed_hosts` / `allowed_url_prefixes`
# to your own asset origins in production - leaving both empty with fetching on
# logs a startup warning.
# ---------------------------------------------------------------------------
[image_fetch]
enabled = false
max_bytes = 10485760          # 10 MiB per image
timeout_ms = 5000             # per-fetch timeout
allowed_schemes = ["https"]   # add "http" to allow plaintext
allowed_hosts = []            # e.g. ["cdn.example.com", ".mycompany.com"]; empty = any public host
allowed_url_prefixes = []     # e.g. ["https://cdn.example.com/images/"]; empty = no prefix restriction
