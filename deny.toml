# cargo-deny configuration (M7 §7.4): advisories + license policy.
# Run locally with `cargo deny check`.

[advisories]
version = 2
# A yanked *transitive* crate we can't control (spin 0.9.8 via sqlx → flume) is
# a warning, not a hard failure; direct deps are still reviewed.
yanked = "warn"
# Advisories consciously accepted, each transitive and not exploitable here:
ignore = [
    # `rsa` Marvin timing side-channel. `rsa` is a Cargo.lock-only artifact of
    # sqlx's macro crate (MySQL path); it is NOT in our compiled graph
    # (`cargo tree -i rsa` finds nothing) and LUMEN performs no RSA/MySQL ops.
    "RUSTSEC-2023-0071",
    # `instant` unmaintained - transitive via `notify` (config file-watch);
    # used only for coarse timers. Bumps land when `notify` moves to `web-time`.
    "RUSTSEC-2024-0384",
]

[licenses]
version = 2
# Permissive licenses only - LUMEN ships as a single self-hostable binary,
# so no copyleft that would impose obligations on operators.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    # CC0-1.0 is a public-domain dedication (notify → file-watch): no obligations
    # on operators, strictly more permissive than MIT. Fits the policy below.
    "CC0-1.0",
]
# A dependency whose license can't be determined is a review item, not a silent pass.
confidence-threshold = 0.9

[bans]
# Duplicate versions bloat the binary but aren't fatal; surface them.
multiple-versions = "warn"
wildcards = "deny"

[sources]
# Only crates.io - no git or unknown registries slip in unaudited.
unknown-registry = "deny"
unknown-git = "deny"
