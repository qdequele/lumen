name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (pedantic, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  # The MSRV is a support statement, so it must compile: check the workspace
  # against the committed Cargo.lock on the declared minimum (Cargo.toml
  # `rust-version`). Keep the toolchain version here in sync with it.
  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check workspace on MSRV (locked)
        run: cargo check --workspace --locked

  no-em-dashes:
    name: no em-dashes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Reject the U+2014 em-dash in EVERY tracked text file (git grep -I
      # skips binaries), not an extension allowlist - the old list missed
      # .sql, which is how migration 0001 shipped with one. House style: use
      # hyphens, commas, colons, parentheses, or restructure. Exclusions:
      # Cargo.lock and LICENSE (generated / legal text we do not edit) and
      # bench/results (verbatim third-party benchmark output).
      - name: Reject em-dashes
        run: |
          emdash=$(printf '\342\200\224')
          set +e
          hits=$(git grep -I -n -e "$emdash" -- . ':!Cargo.lock' ':!LICENSE' ':!bench/results')
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "::error::Em-dashes (U+2014) are not allowed. Use hyphens, commas, colons, or restructure." >&2
            printf '%s\n' "$hits" >&2
            exit 1
          elif [ "$rc" -ne 1 ]; then
            echo "::error::git grep failed with status $rc" >&2
            exit "$rc"
          fi
          echo "No em-dashes found."

  supply-chain:
    name: audit · deny
    runs-on: ubuntu-latest
    # rustsec/audit-check posts its findings as a check-run; on a repo whose
    # default GITHUB_TOKEN is read-only that call 403s ("Resource not accessible
    # by integration"). Grant just the two scopes it needs, nothing more.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      # Advisory database check (RUSTSEC) - fails on known vulnerabilities.
      # Ignored advisories are transitive and not exploitable here; the
      # rationale lives in deny.toml (kept in sync).
      - name: cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: RUSTSEC-2023-0071,RUSTSEC-2024-0384

      # License policy + advisories + source pinning (see deny.toml).
      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses sources

  examples:
    name: example configs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      # --check-config needs no env vars: provider keys are only read when a
      # request routes to a provider, and the master key only at real boot.
      - name: Validate every example config
        run: |
          cargo build -q -p server --bin lumen
          for cfg in examples/*/config.toml; do
            echo "== $cfg"
            ./target/debug/lumen --check-config --config "$cfg"
          done
