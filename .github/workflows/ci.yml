name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (pedantic, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  no-em-dashes:
    name: no em-dashes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Reject the U+2014 em-dash in tracked text. House style: use hyphens,
      # commas, colons, parentheses, or restructure. Cargo.lock and LICENSE
      # are excluded (generated / legal text we do not edit).
      - name: Reject em-dashes
        run: |
          hits=$(git ls-files -- '*.md' '*.rs' '*.toml' '*.yml' '*.yaml' '*.txt' \
            ':!Cargo.lock' ':!LICENSE' \
            | xargs -r perl -CSD -ne 'print "$ARGV:$.: $_" if /\x{2014}/; close ARGV if eof;')
          if [ -n "$hits" ]; then
            echo "::error::Em-dashes (U+2014) are not allowed. Use hyphens, commas, colons, or restructure." >&2
            printf '%s\n' "$hits" >&2
            exit 1
          fi
          echo "No em-dashes found."

  supply-chain:
    name: audit · deny
    runs-on: ubuntu-latest
    # rustsec/audit-check posts its findings as a check-run; on a repo whose
    # default GITHUB_TOKEN is read-only that call 403s ("Resource not accessible
    # by integration"). Grant just the two scopes it needs, nothing more.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      # Advisory database check (RUSTSEC) - fails on known vulnerabilities.
      # Ignored advisories are transitive and not exploitable here; the
      # rationale lives in deny.toml (kept in sync).
      - name: cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: RUSTSEC-2023-0071,RUSTSEC-2024-0384

      # License policy + advisories + source pinning (see deny.toml).
      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses sources
