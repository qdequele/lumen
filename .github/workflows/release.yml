name: Release

# Cut a release on a semver tag: static musl binaries (x86_64 + aarch64) attached
# to the GitHub Release, and a multi-arch distroless image pushed to GHCR (M7 §7.2).
#
# Order of operations: the full test gate must pass on the tagged commit first;
# then the GitHub Release is created with notes extracted from CHANGELOG.md;
# only then are binaries (with .sha256 checksums) attached and the image pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # attach binaries to the release
  packages: write # push the image to GHCR

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Tagging a commit must not ship it untested: the same gate as ci.yml runs
  # on the tagged commit before anything is built or published.
  gate:
    name: test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (pedantic, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  # Create the release up front with its notes, so the binaries jobs attach to
  # a release that already has a curated body instead of an empty one.
  release-notes:
    name: create release with CHANGELOG notes
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4

      - name: Extract this version's CHANGELOG section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            index($0, "## [" ver "]") == 1 { found = 1; next }
            /^## \[/ { found = 0 }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if ! [ -s RELEASE_NOTES.md ]; then
            echo "::error::CHANGELOG.md has no \"## [$version]\" section; refusing to cut a release with empty notes." >&2
            exit 1
          fi
          echo "extracted $(wc -l < RELEASE_NOTES.md) lines of release notes"

      - name: Create the release
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md

  binaries:
    name: static binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: release-notes
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # `cross` gives a musl-capable linker for both targets without host setup.
      - name: Install cross
        run: cargo install cross --locked

      - name: Build release binary
        run: cross build --release --bin lumen --target ${{ matrix.target }}

      - name: Package and checksum
        run: |
          bin="target/${{ matrix.target }}/release/lumen"
          size=$(stat -c%s "$bin")
          echo "binary size: $size bytes"
          # Fail the release if the stripped binary blows past the 25 MB budget.
          test "$size" -lt 26214400 || { echo "binary exceeds 25 MB"; exit 1; }
          tar -czf "lumen-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" lumen
          sha256sum "lumen-${{ matrix.target }}.tar.gz" > "lumen-${{ matrix.target }}.tar.gz.sha256"

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            lumen-${{ matrix.target }}.tar.gz
            lumen-${{ matrix.target }}.tar.gz.sha256

  image:
    name: multi-arch image → GHCR
    runs-on: ubuntu-latest
    needs: release-notes
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
